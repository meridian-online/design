name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  crate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: meridian-design
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - run: cargo build
      - run: cargo test
