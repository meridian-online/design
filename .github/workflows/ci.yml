name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Repo-wide hygiene gate. Deliberately first, deliberately toolchain-free: it
  # is `git grep` over tracked files and finishes in seconds, so a leaked private
  # planning identifier goes red long before the crate build has resolved a
  # dependency.
  #
  # NOTE the absence of `defaults.run.working-directory`. The `crate` job below
  # scopes itself to `meridian-design/`; this one must see the WHOLE repository —
  # guidelines/, decisions/, validation/, README, workflows and all — because
  # prose is where these identifiers actually leak. The script also cd's to the
  # repo root itself, so it stays repo-wide even if a default is added later.
  public-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      # The gate's own regression test runs FIRST. A hygiene gate fails silently
      # in both directions — it can stop matching, or start matching honest
      # prose — so "the gate still works" has to be established before "the tree
      # is clean" means anything.
      - name: hygiene gate self-test
        run: ./scripts/check-public-hygiene-selftest.sh
      - name: private planning identifiers
        run: ./scripts/check-public-hygiene.sh

  # Formatting + lint, split out from `crate` rather than appended to it so a
  # style regression reports without waiting on a build, and so a red build
  # cannot hide a lint failure (or the reverse). Same `working-directory`
  # scoping as `crate`: the Cargo package lives in `meridian-design/`, not at
  # the repo root.
  #
  # Green on arrival, not aspirational — the two commits preceding this one
  # formatted the crate with default rustfmt and cleared its one clippy warning.
  fmt-clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: meridian-design
    steps:
      - uses: actions/checkout@v4
      # Pinned to match `crate` and the repo's rust-toolchain.toml. Clippy's
      # lint set moves between releases, so an unpinned toolchain would let a
      # newer rustc turn this gate red on a commit that changed nothing.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      # `fmt` first: it builds nothing, so a formatting slip reports in seconds.
      - run: cargo fmt --all --check
      # `--all-targets` so the `tests/` gates are linted too, not just the lib —
      # the crate's one clippy warning lived in `tests/palette_gate.rs`, and a
      # lib-only run would never have seen it.
      - run: cargo clippy --workspace --all-targets -- -D warnings

  crate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: meridian-design
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - run: cargo build
      - run: cargo test
