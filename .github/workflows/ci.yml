name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Repo-wide hygiene gate. Deliberately first, deliberately toolchain-free: it
  # is `git grep` over tracked files and finishes in seconds, so a leaked private
  # planning identifier goes red long before the crate build has resolved a
  # dependency.
  #
  # NOTE the absence of `defaults.run.working-directory`. The `crate` job below
  # scopes itself to `meridian-design/`; this one must see the WHOLE repository —
  # guidelines/, decisions/, validation/, README, workflows and all — because
  # prose is where these identifiers actually leak. The script also cd's to the
  # repo root itself, so it stays repo-wide even if a default is added later.
  public-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      # The gate's own regression test runs FIRST. A hygiene gate fails silently
      # in both directions — it can stop matching, or start matching honest
      # prose — so "the gate still works" has to be established before "the tree
      # is clean" means anything.
      - name: hygiene gate self-test
        run: ./scripts/check-public-hygiene-selftest.sh
      - name: private planning identifiers
        run: ./scripts/check-public-hygiene.sh

  # Formatting + lint, split out from `crate` rather than appended to it so a
  # style regression reports without waiting on a build, and so a red build
  # cannot hide a lint failure (or the reverse).
  #
  # Runs at the repo root over the whole workspace. There used to be a
  # `working-directory: meridian-design` here, from when this repo held a single
  # crate — but the moment a sibling crate (`meridian-egui`) was added, that
  # default made it invisible to CI: `cargo` scoped to `meridian-design/` cannot
  # see a member beside it. `--workspace` at the root is what includes both.
  fmt-clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # Pinned to match `crate` and the repo's rust-toolchain.toml. Clippy's
      # lint set moves between releases, so an unpinned toolchain would let a
      # newer rustc turn this gate red on a commit that changed nothing.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      # `fmt` first: it builds nothing, so a formatting slip reports in seconds.
      - run: cargo fmt --all --check
      # `--all-targets` so the `tests/` gates, the `meridian-egui` harness test
      # and the eframe `gallery` example are all linted and compiled — not just
      # the libs. A lib-only run would never see a broken example.
      - run: cargo clippy --workspace --all-targets -- -D warnings

  crate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - run: cargo build --workspace
      - run: cargo test --workspace

  # Licence gate for the egui emitter. `meridian-design` is dependency-free, but
  # `meridian-egui` links `egui` and pulls a dev-only `eframe`/`wgpu` surface;
  # `deny.toml` (at the repo root) is the allow-list an MIT binary may carry.
  # Scoped to `check licenses` deliberately: `check advisories` reddens on
  # pre-existing RUSTSEC entries carried by the wgpu/egui tree, which is a
  # separate concern from what this gate is for.
  licenses:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses
